name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: for f in src/*.js; do node --check "$f"; done
      - name: Smoke test (help + version)
        run: |
          node src/index.js --help
          node src/index.js --version
